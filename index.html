<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .input-group .form-control {
            width: 70px;
            height: 70px;
            text-align: center;
            font-size: 24px;
            line-height: 70px;
        }
        .btn-calc {
            width: 70px;
            height: 70px;
            font-size: 20px;
        }
        .btn-entr {
            width: 219px;
            height: 70px;
            font-size: 30px;
            background-color: navy;
            color: white;
        }
         .btn-entr:hover {
            background-color: #e26a00;
            color: white;
        }
        .btn-reset {
            margin-top: 15px;
            width: 219px;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #28a745;
            color: white;
        }
        .error {
            background-color: #dc3545;
            color: white;
        }
        .quota {
            background-color: #ffc107;
            color: #212529;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .overlay.show {
            display: flex;
        }
        .reset-box {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .reset-box input {
            margin: 15px 0;
        }
        .reset-box .btn {
            width: 47%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Masukkan Angka</h1>
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="userInput" readonly>
        </div>
        <div class="btn-group-vertical">
            <div class="btn-group mb-2">
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(1)">1</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(2)">2</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(3)">3</button>
            </div>
            <div class="btn-group mb-2">
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(4)">4</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(5)">5</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(6)">6</button>
            </div>
            <div class="btn-group mb-2">
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(7)">7</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(8)">8</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(9)">9</button>
            </div>
            <div class="btn-group mb-2">
                <button class="btn btn-secondary btn-calc" onclick="clearInput()">C</button>
                <button class="btn btn-secondary btn-calc" onclick="appendNumber(0)">0</button>
                <button class="btn btn-secondary btn-calc" onclick="appendDot()">.</button>
            </div>
            <div class="btn-group mb-2">
                <button class="btn btn-entr" onclick="validateInput()">Enter</button>
            </div>
        </div>
        <button type="button" class="btn btn-outline-dark btn-reset" id="openResetBtn">Reset Kuota</button>
        <div id="message" class="message"></div>
    </div>

    <div class="overlay" id="resetOverlay">
        <div class="reset-box">
            <h5>Masukkan Password</h5>
            <input type="password" class="form-control" id="resetPasswordInput" placeholder="Password">
            <div>
                <button type="button" class="btn btn-secondary" id="cancelResetBtn">Batal</button>
                <button type="button" class="btn btn-primary" id="confirmResetBtn">Reset</button>
            </div>
        </div>
    </div>

    <script>
        var validNumbers = [4878, 4430, 5353, 4968, 5793, 5221, 5135, 5429, 5236, 5101, 6369, 6327, 6290, 5998, 6512, 6183, 6932, 6856, 6923, 7029, 7167]; // Daftar angka valid
        var maxQuota = 2; // batas maksimal pemakaian per angka
        var resetPassword = "123";

        // Kunci penyimpanan di localStorage, supaya kuota tetap tersimpan walau halaman di-refresh
        var STORAGE_KEY = 'inputValidationQuota';

        function loadUsage() {
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return {};
                }
            }
            return {};
        }

        function saveUsage(usage) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(usage));
        }

        var usageCount = loadUsage();

        // Buat "tanda tangan" dari daftar soal saat ini. Kalau daftar validNumbers
        // diubah (soal baru untuk kelas lain), tanda tangan ini otomatis berubah,
        // sehingga kuota lama otomatis dihapus tanpa perlu klik reset manual.
        var SIGNATURE_KEY = 'inputValidationSignature';
        var currentSignature = validNumbers.join(',');
        var savedSignature = localStorage.getItem(SIGNATURE_KEY);

        if (savedSignature !== currentSignature) {
            usageCount = {};
            saveUsage(usageCount);
            localStorage.setItem(SIGNATURE_KEY, currentSignature);
        }

        function appendNumber(number) {
            var input = document.getElementById('userInput');
            input.value += number;
        }

        function appendDot() {
            var input = document.getElementById('userInput');
            if (!input.value.includes('.')) {
                input.value += '.';
            }
        }

        function clearInput() {
            var input = document.getElementById('userInput');
            input.value = '';
        }

        function showMessage(text, cssClass, hideAfterMs) {
            var messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + cssClass;
            messageDiv.style.display = 'block';
            setTimeout(clearInputAll, hideAfterMs);
        }

        function validateInput() {
            var input = document.getElementById('userInput').value;
            var number = parseFloat(input);

            if (validNumbers.includes(number)) {
                var used = usageCount[number] || 0;

                if (used >= maxQuota) {
                    showMessage('Jawaban Melebihi Kuota', 'error', 3000);
                    return;
                }

                usageCount[number] = used + 1;
                saveUsage(usageCount);
                showMessage('Kamu berhasil', 'success', 5500);
            } else {
                showMessage('Coba lagi', 'error', 3000);
            }
        }

        function clearInputAll(){
            clearInput();
            var messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';
        }

        function openResetOverlay() {
            document.getElementById('resetPasswordInput').value = '';
            document.getElementById('resetOverlay').classList.add('show');
            document.getElementById('resetPasswordInput').focus();
        }

        function closeResetOverlay() {
            document.getElementById('resetOverlay').classList.remove('show');
        }

        function confirmReset() {
            var pwd = document.getElementById('resetPasswordInput').value;
            if (pwd === resetPassword) {
                usageCount = {};
                saveUsage(usageCount);
                localStorage.setItem(SIGNATURE_KEY, currentSignature);
                clearInput();
                closeResetOverlay();
                showMessage('Kuota berhasil direset', 'success', 2500);
            } else {
                closeResetOverlay();
                showMessage('Password salah', 'error', 2500);
            }
        }

        // Pasang event listener setelah halaman siap
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('openResetBtn').addEventListener('click', openResetOverlay);
            document.getElementById('cancelResetBtn').addEventListener('click', closeResetOverlay);
            document.getElementById('confirmResetBtn').addEventListener('click', confirmReset);
            // Tekan Enter di kotak password juga langsung reset
            document.getElementById('resetPasswordInput').addEventListener('keyup', function (e) {
                if (e.key === 'Enter') {
                    confirmReset();
                }
            });
        });
    </script>
</body>
</html>
